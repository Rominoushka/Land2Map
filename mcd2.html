<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Land2Map MCD stable</title><style>body{margin:0;background:#0b1020;color:#f8fafc;font-family:system-ui,Arial}header,.bar,.tools,aside,main{padding:12px}input,select,button{font:inherit;background:#172033;color:#f8fafc;border:1px solid #334155;border-radius:10px;padding:8px}button{cursor:pointer}button:hover,.card:hover,.layer:hover{border-color:#60a5fa;background:#17233a;box-shadow:0 0 0 1px #1d4ed8}.bar,.tools{display:grid;gap:8px}.tools{border:1px solid #334155;border-radius:14px;margin:8px 12px}.wrap{display:grid;grid-template-columns:240px 1fr;gap:8px}.nav{display:grid;gap:7px}.nav button.on{outline:2px solid #60a5fa}.stat,.head,.card,.layer{background:#111827;border:1px solid #334155;border-radius:14px;padding:10px;margin:8px 0}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:8px}.muted,.code,.small{color:#94a3b8;font-size:12px}.pill{display:inline-block;border:1px solid #334155;border-radius:999px;padding:3px 7px;font-size:11px;margin:3px}.mcd{color:#bfdbfe;font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700}.ok{border-color:#22c55e}.ko{border-color:#f97316}.bad{border-color:#ef4444}.modal{position:fixed;inset:0;background:rgba(2,6,23,.75);display:none;align-items:center;justify-content:center;z-index:50}.modal.open{display:flex}.pop{width:min(1100px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid #475569;border-radius:18px;padding:14px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}table{border-collapse:collapse;width:100%;font-size:13px}td,th{border-bottom:1px solid #334155;padding:6px;text-align:left}@media(max-width:850px){.wrap{display:block}.cards{grid-template-columns:1fr}}</style></head><body><header><h2>Land2Map - Vue MCD stable v2</h2><div class="muted">couche_mcd en snake_case, 10 caracteres max : <span class="mcd">aep_r
