<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Land2Map</title><style>body{margin:0;background:#0b1020;color:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,Arial}header,.bar{padding:12px 14px;border-bottom:1px solid #263244}h1{font-size:18px;margin:0}.bar{display:grid;gap:8px}input,select,button,textarea{font:inherit;border:1px solid #263244;border-radius:12px;background:#172033;color:#f8fafc;padding:10px}.layout{display:block}.side{padding:12px;border-bottom:1px solid #263244}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat,.card,.head,.box{background:#111827;border:1px solid #263244;border-radius:16px;padding:10px}.stat b{font-size:20px}nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.net.active{outline:2px solid #60a5fa}main{padding:12px}.cards{display:grid;gap:10px}.card.ok{border-color:#22c55e}.card.warn{border-color:#f59e0b}.card.bad{border-color:#ef4444}.code,.muted{color:#94a3b8;font-size:12px}.pill{display:inline-block;border:1px solid #263244;border-radius:999px;padding:3px 7px;font-size:11px;margin:4px 4px 0 0}.warn{color:#fed7aa}.acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}dialog{width:100vw;height:100vh;max-height:100vh;border:0;background:#0f172a;color:#f8fafc;padding:0}.dh{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #263244}.tabs{display:flex;gap:8px;padding:10px;border-bottom:1px solid #263244}.tab{display:none;padding:12px}.tab.on{display:block}table{border-collapse:collapse;width:100%;font-size:13px}td,th{border-bottom:1px solid #263244;padding:6px;text-align:left}td input{min-width:130px}.scroll{overflow:auto}@media(min-width:900px){.bar{grid-template-columns:1fr 180px 180px 120px}.layout{display:grid;grid-template-columns:260px 1fr}.side{border-right:1px solid #263244;border-bottom:0}nav{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}dialog{width:min(980px,calc(100vw - 40px));height:auto;max-height:calc(100vh - 40px);border-radius:20px}}</style></head><body><header><h1>Land2Map · Palette cohérente</h1><div class="muted">Ponctuels filtrés par réseau — plus de luminaire/chambre de tirage dans AEP</div></header><section class="bar"><input id="q" placeholder="Recherche"><select id="df"><option value="">Toutes décisions</option><option>À valider</option><option>Validé</option><option>À corriger</option><option>Exclu</option></select><select id="gf"><option value="">Tous groupes</option></select><button id="ex">Exporter</button></section><div class="layout"><aside class="side"><div id="stats" class="stats"></div><nav id="nav"></nav></aside><main id="main"></main></div><dialog id="dlg"><div class="dh"><div><b id="dt"></b><div id="ds" class="muted"></div></div><button onclick="dlg.close()">Fermer</button></div><div class="tabs"><button onclick="show('g')">Général</button><button onclick="show('a')">Attributs</button><button onclick="show('l')">Listes</button></div><div id="tg" class="tab on"></div><div id="ta" class="tab"></div><div id="tl" class="tab"></div></dialog><script>const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));let cur='AEP',S=JSON.parse(localStorage.getItem('l2m_coherent_v1')||'{"items":{},"lists":{}}');const N={AEP:'Eau potable',EUS:'Eaux usées',EPL:'Eaux pluviales',UNI:'Unitaire',MLT:'Multiréseaux',ECL:'Éclairage public',BTA:'Basse tension A',HTA:'Haute tension A',HTB:'Haute tension B',TEL:'Télécom',CFA:'Courants faibles',GAZ:'Gaz',CHI:'Chimique',CHU:'Chauffage urbain',HYD:'Hydrocarbures',ARO:'Arrosage',SGN:'Signalisation',NDE:'Non déterminé',FRV:'Fourreau vide'};const L={AEP:['CANALISATION','BRANCHEMENT'],EUS:['TRONCON','BRANCHEMENT'],EPL:['TRONCON','BRANCHEMENT'],UNI:['TRONCON','BRANCHEMENT'],MLT:['TRONCON','FOURREAU'],ECL:['CABLE','FOURREAU'],BTA:['CABLE','FOURREAU'],HTA:['CABLE','FOURREAU'],HTB:['CABLE','FOURREAU'],TEL:['CABLE','FOURREAU'],CFA:['CABLE','FOURREAU'],GAZ:['CANALISATION','BRANCHEMENT'],CHI:['CANALISATION','BRANCHEMENT'],CHU:['CANALISATION','BRANCHEMENT'],HYD:['CANALISATION','BRANCHEMENT'],ARO:['CANALISATION','BRANCHEMENT'],SGN:['CABLE','FOURREAU'],NDE:['TRONCON','FOURREAU'],FRV:['FOURREAU']};const P={AEP:['VANNE','PURGE','VENTOUSE','CLAPET','BOUCHE_CLE','BOUCHE_INCENDIE','POTEAU_INCENDIE','COMPTEUR','REGARD_TECHNIQUE','PLAQUE_RONDE'],EUS:['REGARD_CIRCULAIRE','REGARD_RECTANGULAIRE','BOITE_BRANCHEMENT','TAMPON','POSTE_RELEVAGE','DEVERSSOIR'],EPL:['REGARD_CIRCULAIRE','REGARD_RECTANGULAIRE','BOITE_BRANCHEMENT','AVALOIR','GRILLE_AVALOIR','TAMPON','DEVERSSOIR'],UNI:['REGARD_CIRCULAIRE','REGARD_RECTANGULAIRE','BOITE_BRANCHEMENT','AVALOIR','GRILLE_AVALOIR','TAMPON','DEVERSSOIR'],ECL:['ARMOIRE','COFFRET','CANDELABRE','MAT','LUMINAIRE','PROJECTEUR','BORNE_LUMINEUSE','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','PLAQUE_RONDE'],BTA:['POSTE','ARMOIRE','COFFRET','TRANSFORMATEUR','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','POTEAU','APPUI','BOITE','PLAQUE_RONDE'],HTA:['POSTE','ARMOIRE','COFFRET','TRANSFORMATEUR','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','POTEAU','APPUI','CELLULE_HTA','PLAQUE_RONDE'],HTB:['POSTE','TRANSFORMATEUR','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','PYLONE','APPUI','SECTIONNEUR','PLAQUE_RONDE'],TEL:['CHAMBRE_TIRAGE','REGARD_TECHNIQUE','ARMOIRE','BORNE_TEL','BOITIER','REPARTITEUR','POTEAU','APPUI','PLAQUE_RONDE'],CFA:['CHAMBRE_TIRAGE','REGARD_TECHNIQUE','ARMOIRE','BORNE','BOITIER','CAPTEUR','POTEAU','APPUI','PLAQUE_RONDE'],GAZ:['VANNE','COFFRET_GAZ','POSTE_DETENTE','BOUCHE_CLE','REGARD_TECHNIQUE','PLAQUE_RONDE'],CHI:['VANNE','REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','BOUCHE_CLE','ARMOIRE_COMMANDE','PLAQUE_RONDE'],CHU:['VANNE','REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','BOUCHE_CLE','ARMOIRE_COMMANDE','PLAQUE_RONDE'],HYD:['VANNE','REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','BOUCHE_CLE','ARMOIRE_COMMANDE','PLAQUE_RONDE'],ARO:['VANNE','REGARD_TECHNIQUE','BOUCHE_ARROSAGE','BOUCHE_CLE','PROGRAMMATEUR','PLAQUE_RONDE'],SGN:['ARMOIRE_SIGNALISATION','FEU_TRICOLORE','BOITIER','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','POTEAU','SUPPORT','PLAQUE_RONDE'],MLT:['REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','PLAQUE_RONDE','BORNE','REPERE'],NDE:['REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','PLAQUE_RONDE','BORNE','REPERE'],FRV:['REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','PLAQUE_RONDE']};const R={LST_RESEAU:Object.keys(N),LST_CLASSE_PRECISION:['A','B','C'],LST_ETAT_RESEAU:['En service','Abandonné','Projeté','Inconnu'],LST_POSE:['Souterrain','Aérien','Façade','Inconnu'],LST_MODE_LEVE:['GNSS','Station totale','Détection','Digitalisation'],LST_FORME:['Circulaire','Rectangulaire','Carrée','Ovoïde','Inconnue']};let O=[];function T(s){return s.toLowerCase().replaceAll('_',' ').replace(/^./,c=>c.toUpperCase())}function fam(x){if(['POTEAU','APPUI','PYLONE','SUPPORT','MAT','CANDELABRE'].includes(x))return'Supports/support';if(x.includes('PLAQUE')||x.includes('TAMPON')||x.includes('BOUCHE')||x.includes('GRILLE'))return'Affleurants/affleurant';if(x.includes('REGARD')||x.includes('CHAMBRE')||x==='POSTE'||x==='POSTE_RELEVAGE')return'Ouvrages/ouvrage';return'Équipements/equipement'}function A(c,t,l,li='',v=''){return{champ:c,type_donnee:t,libelle_attribut:l,liste_reference:li,valeur_forcee:v}}function attrs(n,f,t,F={}){return[A('id','UUID','Identifiant'),A('res','Liste','Réseau','LST_RESEAU',n),A(f.slice(0,3)+'_type','Texte','Type','',t),A('mlev','Liste','Mode levé','LST_MODE_LEVE'),A('clas','Liste','Classe','LST_CLASSE_PRECISION',F.clas||''),A('etat','Liste','État','LST_ETAT_RESEAU',F.etat||''),A('pose','Liste','Pose','LST_POSE',F.pose||''),A('obs','Texte','Observation')]}function add(n,code,lib,g,f,t,F={},v=''){O.push({uid:code,reseau:n,code,libelle:lib,groupe:g,famille:f,type:t,variant:v,sel:n.toLowerCase()+'_'+t+(v?'_'+v.toLowerCase().replaceAll(' ','_'):'')+'_sel',attrs:attrs(n,f,t,F),bloc:g==='Linéaires'?'':code.replace(n+'_','')+'.dwg'})}for(const n in N){for(const b of L[n]){let t=b.toLowerCase();add(n,n+'_'+b,T(b),'Linéaires','troncon',t);add(n,n+'_'+b+'_CLASSE_A',T(b)+' classe A','Linéaires','troncon',t,{clas:'A'},'Classe A');add(n,n+'_'+b+'_CLASSE_B',T(b)+' classe B','Linéaires','troncon',t,{clas:'B'},'Classe B');add(n,n+'_'+b+'_CLASSE_C',T(b)+' classe C','Linéaires','troncon',t,{clas:'C'},'Classe C');add(n,n+'_'+b+'_ABANDONNE',T(b)+' abandonné','Linéaires','troncon',t,{etat:'Abandonné'},'Abandonné');add(n,n+'_'+b+'_AERIEN',T(b)+' aérien','Linéaires','troncon',t,{pose:'Aérien'},'Aérien')}for(const x of P[n]||[]){let [g,f]=fam(x).split('/');add(n,n+'_'+x,T(x),g,f,x.toLowerCase())}}function sv(){localStorage.setItem('l2m_coherent_v1',JSON.stringify(S))}function st(o){return S.items[o.uid]||{}}function dec(o){return st(o).decision||'À valider'}function e(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function init(){gf.innerHTML='<option value="">Tous groupes</option>'+[...new Set(O.map(o=>o.groupe))].map(g=>'<option>'+g+'</option>').join('');q.oninput=df.oninput=gf.oninput=render;ex.onclick=()=>{let b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='validation_palette_land2map.json';a.click()};render()}function filt(){let s=q.value.toLowerCase();return O.filter(o=>o.reseau===cur&&(!df.value||dec(o)===df.value)&&(!gf.value||o.groupe===gf.value)&&(!s||[o.code,o.libelle,o.sel,o.variant].join(' ').toLowerCase().includes(s)))}function render(){stats.innerHTML='<div class="stat"><b>'+O.length+'</b><div class="muted">Objets</div></div><div class="stat"><b>'+O.filter(o=>dec(o)==='À valider').length+'</b><div class="muted">À valider</div></div><div class="stat"><b>'+O.filter(o=>dec(o)==='Validé').length+'</b><div class="muted">Validés</div></div><div class="stat"><b>'+O.filter(o=>dec(o)==='À corriger').length+'</b><div class="muted">À corriger</div></div>';nav.innerHTML=Object.keys(N).map(n=>'<button class="net '+(n===cur?'active':'')+'" data-n="'+n+'"><b>'+n+'</b><span class="muted">'+N[n]+'</span></button>').join('');$$('.net').forEach(b=>b.onclick=()=>{cur=b.dataset.n;render()});let arr=filt(),by={};arr.forEach(o=>(by[o.groupe]??=[]).push(o));main.innerHTML='<div class="head"><b>'+cur+' - '+N[cur]+'</b><div class="muted">'+arr.length+' objet(s). Ponctuels filtrés métier par réseau.</div></div>'+Object.entries(by).map(([g,a])=>'<h3>'+g+' · '+a.length+'</h3><div class="cards">'+a.map(card).join('')+'</div>').join('');$$('[data-act]').forEach(b=>b.onclick=()=>{let u=b.closest('.card').dataset.u;S.items[u]={...S.items[u],decision:b.dataset.act};sv();render()});$$('[data-edit]').forEach(b=>b.onclick=()=>openEdit(b.closest('.card').dataset.u))}function card(o){let d=dec(o),c=d==='Validé'?'ok':d==='À corriger'?'warn':d==='Exclu'?'bad':'';return '<article class="card '+c+'" data-u="'+o.uid+'"><b>'+e(o.libelle)+'</b><div class="code">'+e(o.code)+'</div><span class="pill">'+o.famille+'/'+o.type+'</span>'+(o.variant?'<span class="pill warn">'+o.variant+'</span>':'')+'<div class="muted">SEL : <b>'+o.sel+'</b><br>DWG : '+(o.bloc||'-')+'<br>ATTR : '+o.attrs.length+'</div><div class="acts"><button data-act="Validé">Valider</button><button data-act="À corriger">Corriger</button><button data-act="Exclu">Exclure</button><button data-edit>Attributs / listes</button></div></article>'}function show(x){$$('.tab').forEach(t=>t.classList.remove('on'));$('#t'+x).classList.add('on')}function openEdit(u){let o=O.find(x=>x.uid===u),m={...o,...st(o),attrs:st(o).attrs||o.attrs};dt.textContent=o.code+' · '+o.libelle;ds.textContent=o.reseau+' / '+o.groupe;tg.innerHTML='<div class="box"><label>Décision<select id="ed"><option>À valider</option><option>Validé</option><option>À corriger</option><option>Exclu</option></select></label><br><label>Sélection<input id="es" value="'+e(m.sel)+'"></label><br><label>Bloc<input id="eb" value="'+e(m.bloc)+'"></label><br><label>Commentaire<textarea id="ec">'+e(m.commentaire||'')+'</textarea></label><br><button id="sg">Enregistrer</button></div>';ed.value=dec(o);sg.onclick=()=>{S.items[u]={...S.items[u],decision:ed.value,sel:es.value,bloc:eb.value,commentaire:ec.value};sv();render();dlg.close()};ta.innerHTML='<div class="scroll"><table><tr><th>Champ</th><th>Type</th><th>Libellé</th><th>Liste</th><th>Forcé</th></tr>'+m.attrs.map((a,i)=>'<tr><td><input data-i="'+i+'" data-k="champ" value="'+e(a.champ)+'"></td><td><input data-i="'+i+'" data-k="type_donnee" value="'+e(a.type_donnee)+'"></td><td><input data-i="'+i+'" data-k="libelle_attribut" value="'+e(a.libelle_attribut)+'"></td><td><input data-i="'+i+'" data-k="liste_reference" value="'+e(a.liste_reference)+'"></td><td><input data-i="'+i+'" data-k="valeur_forcee" value="'+e(a.valeur_forcee)+'"></td></tr>').join('')+'</table></div><button id="sa">Enregistrer attributs</button>';sa.onclick=()=>{let a=JSON.parse(JSON.stringify(m.attrs));$$('#ta input').forEach(i=>a[i.dataset.i][i.dataset.k]=i.value);S.items[u]={...S.items[u],attrs:a,decision:'À corriger'};sv();render();openEdit(u)};let names=[...new Set(m.attrs.map(a=>a.liste_reference).filter(Boolean))];tl.innerHTML=names.length?names.map(n=>'<div class="box"><b>'+n+'</b><textarea data-list="'+n+'" rows="6">'+(S.lists[n]||R[n]||[]).join('\n')+'</textarea><button data-sl="'+n+'">Enregistrer liste</button></div>').join(''):'<p>Aucune liste.</p>';$$('[data-sl]').forEach(b=>b.onclick=()=>{S.lists[b.dataset.sl]=$('[data-list="'+b.dataset.sl+'"]').value.split('\n').map(x=>x.trim()).filter(Boolean);sv();alert('Liste enregistrée')});show('g');dlg.showModal()}init();</script></body></html>
