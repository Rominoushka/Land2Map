<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Land2Map</title><style>body{margin:0;background:#0b1020;color:#f8fafc;font-family:system-ui}header,.bar,aside,main{padding:12px}input,select,button{font:inherit;background:#172033;color:#f8fafc;border:1px solid #334155;border-radius:10px;padding:8px}.bar{display:grid;gap:8px}.wrap{display:block}.nav{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.nav button.on{outline:2px solid #60a5fa}.card,.head,.stat{background:#111827;border:1px solid #334155;border-radius:14px;padding:10px;margin:8px 0}.cards{display:grid;gap:8px}.muted,.code{color:#94a3b8;font-size:12px}.pill{display:inline-block;border:1px solid #334155;border-radius:999px;padding:3px 7px;font-size:11px;margin:3px}.ok{border-color:#22c55e}.ko{border-color:#f97316}.bad{border-color:#ef4444}.yes{color:#86efac}.no{color:#fca5a5}.modal{position:fixed;inset:0;background:rgba(2,6,23,.76);display:none;align-items:center;justify-content:center;z-index:20}.modal.open{display:flex}.pop{width:min(1150px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid #475569;border-radius:18px;box-shadow:0 18px 70px #000;padding:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.tabs button.on{background:#2563eb}.pane{display:none}.pane.on{display:block}table{border-collapse:collapse;width:100%;font-size:13px}td,th{border-bottom:1px solid #334155;padding:6px;text-align:left;vertical-align:top}td input,.field{width:160px;background:#172033;color:#f8fafc;border:1px solid #334155;border-radius:7px;padding:5px}.top{display:flex;justify-content:space-between;gap:10px;align-items:start}@media(min-width:900px){.bar{grid-template-columns:1fr 160px 160px 120px 120px}.wrap{display:grid;grid-template-columns:250px 1fr}.nav{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fill,minmax(370px,1fr))}}</style></head><body><header><h2>Land2Map - Palette</h2><div class="muted">Attributs, listes, fichiers DWG/icônes par nom, sauvegarde locale et exports</div></header><section class="bar"><input id="q" placeholder="Recherche"><select id="grp"><option value="">Tous groupes</option></select><select id="dec"><option value="">Toutes décisions</option><option>A valider</option><option>Valide</option><option>A corriger</option><option>Exclu</option></select><button id="saveBtn">Enregistrer</button><button id="json">Export JSON</button><button id="csv">Export CSV</button></section><div class="wrap"><aside><div id="stats"></div><div id="nav" class="nav"></div></aside><main id="main"></main></div><div id="modal" class="modal"><div class="pop"><div class="top"><div><h2 id="mt"></h2><div id="ms" class="muted"></div></div><button id="close">Fermer</button></div><div class="tabs"><button data-tab="a" class="on">Attributs</button><button data-tab="l">Listes</button><button data-tab="f">Fichiers</button><button data-tab="p">Patch</button></div><div id="pa" class="pane on"></div><div id="pl" class="pane"></div><div id="pf" class="pane"></div><div id="pp" class="pane"></div></div></div><script>
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
const KEY='l2m_v21';let cur='AEP',selObj=null;let st=JSON.parse(localStorage.getItem(KEY)||'{}');
const nets='AEP EUS EPL UNI MLT ECL BTA HTA HTB TEL CFA GAZ CHI CHU HYD ARO SGN NDE FRV'.split(' '),aerienOK='ECL BTA HTA HTB TEL CFA SGN'.split(' ');
const names={AEP:'Eau potable',EUS:'Eaux usées',EPL:'Eaux pluviales',UNI:'Unitaire',MLT:'Multiréseaux',ECL:'Éclairage public',BTA:'Basse tension',HTA:'Haute tension A',HTB:'Haute tension B',TEL:'Télécom',CFA:'Courants faibles',GAZ:'Gaz',CHI:'Chimique',CHU:'Chauffage urbain',HYD:'Hydrocarbures',ARO:'Arrosage',SGN:'Signalisation',NDE:'Non déterminé',FRV:'Fourreau vide'};
const vals={LST_MODE_LEVE:['GPS','Station','Détection','Report plan','NR'],LST_CLASSE_PRECISION:['A','B','C'],LST_ETAT_RESEAU:['En service','Abandonné','Projeté','Inconnu'],LST_POSE:['Enterré','Aérien','Façade','Caniveau','Inconnu'],LST_GNSS_FIX:['Fixe','Float','Autonome','Inconnu']};
const lin={AEP:['CANALISATION','BRANCHEMENT'],EUS:['TRONCON','BRANCHEMENT'],EPL:['TRONCON','BRANCHEMENT'],UNI:['TRONCON','BRANCHEMENT'],MLT:['TRONCON','FOURREAU'],ECL:['CABLE','FOURREAU'],BTA:['CABLE','FOURREAU'],HTA:['CABLE','FOURREAU'],HTB:['CABLE','FOURREAU'],TEL:['CABLE','FOURREAU'],CFA:['CABLE','FOURREAU'],GAZ:['CANALISATION','BRANCHEMENT'],CHI:['CANALISATION','BRANCHEMENT'],CHU:['CANALISATION','BRANCHEMENT'],HYD:['CANALISATION','BRANCHEMENT'],ARO:['CANALISATION','BRANCHEMENT'],SGN:['CABLE','FOURREAU'],NDE:['TRONCON','FOURREAU'],FRV:['FOURREAU']};
const ass=['REGARD_CIRCULAIRE','REGARD_RECTANGULAIRE','BOITE_BRANCHEMENT','TAMPON','POSTE_RELEVAGE','DEVERSOIR'],elec=['POSTE','ARMOIRE','COFFRET','TRANSFORMATEUR','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','POTEAU','APPUI','PLAQUE_RONDE'],tele=['CHAMBRE_TIRAGE','REGARD_TECHNIQUE','ARMOIRE','BORNE','BOITIER','POTEAU','APPUI','PLAQUE_RONDE'],flu=['VANNE','REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','BOUCHE_CLE','ARMOIRE_COMMANDE','PLAQUE_RONDE'];
function pts(n){if(n=='AEP')return['VANNE','PURGE','VENTOUSE','CLAPET','BOUCHE_CLE','BOUCHE_INCENDIE','POTEAU_INCENDIE','COMPTEUR','REGARD_TECHNIQUE','PLAQUE_RONDE'];if(['EUS','EPL','UNI'].includes(n))return n=='EUS'?ass:ass.concat(['AVALOIR','GRILLE_AVALOIR']);if(n=='ECL')return['ARMOIRE','COFFRET','CANDELABRE','MAT','LUMINAIRE','PROJECTEUR','BORNE_LUMINEUSE','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','PLAQUE_RONDE'];if(['BTA','HTA','HTB'].includes(n))return elec;if(['TEL','CFA','SGN'].includes(n))return tele;if(['GAZ','CHI','CHU','HYD','ARO'].includes(n))return flu;return['REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','PLAQUE_RONDE','BORNE','REPERE']}
function fam(x){if(['POTEAU','POTEAU_INCENDIE','APPUI','MAT','CANDELABRE'].includes(x))return['Supports','support'];if(x.includes('PLAQUE')||x.includes('TAMPON')||x.includes('BOUCHE')||x.includes('GRILLE'))return['Affleurants','affleurant'];if(x.includes('REGARD')||x.includes('CHAMBRE')||x=='POSTE'||x=='POSTE_RELEVAGE')return['Ouvrages','ouvrage'];return['Equipements','equipement']}
function pref(f,t){if(t=='cable')return'che';if(t=='fourreau')return'fou';if(t=='branchement')return'brt';if(['canalisation','troncon','conduite'].includes(t))return'trc';return{ouvrage:'ouv',affleurant:'afl',equipement:'eqp',support:'sup'}[f]||'obj'}
function A(c,t,l,li='',val='',vis=true,fo=false,obl=false,exp=true){return{c,t,l,li,val,vis,fo,obl,exp}}
function attrs(n,f,t,F={}){let p=pref(f,t),isLin=f=='troncon';let a=[A('id','UUID','Identifiant','','',false,false,true,true),A('calque','Texte','Calque AutoCAD','',F.calque||('ECA_RSX_'+n+'_'+t.toUpperCase()),false,true,true,true),A(p+'_type','Texte','Type objet','',t,false,true,true,true),A(p+'_mlev','Liste','Mode levé','LST_MODE_LEVE','',true,false,true,true),A(p+'_classe','Liste','Classe précision','LST_CLASSE_PRECISION',F.clas||'',!F.clas,!!F.clas,isLin,true),A(p+'_etat','Liste','État','LST_ETAT_RESEAU',F.etat||'',!F.etat,!!F.etat,false,true),A(p+'_pose','Liste','Mode de pose','LST_POSE',F.pose||'',!F.pose,!!F.pose,false,true),A('x','Nombre','Coordonnée X','','',false,false,true,true),A('y','Nombre','Coordonnée Y','','',false,false,true,true),A('z','Nombre','Altitude Z','','',true,false,false,true),A('gnss_hdop','Nombre','GNSS HDOP','','',false),A('gnss_vdop','Nombre','GNSS VDOP','','',false),A('gnss_pdop','Nombre','GNSS PDOP','','',false),A('gnss_fix','Liste','Solution GNSS','LST_GNSS_FIX','',false),A('gnss_prec','Nombre','Précision GNSS','','',false),A('date_leve','Date','Date levé','','',false),A('src_leve','Texte','Source levé','','',false),A('matricule','Texte','Matricule point'),A(p+'_obs','Texte','Observation')];if(!isLin)a.push(A('acad_ech','Nombre','Échelle AutoCAD','','',false),A('acad_xech','Nombre','Échelle X AutoCAD','','',false),A('acad_yech','Nombre','Échelle Y AutoCAD','','',false),A('acad_rot','Nombre','Rotation AutoCAD','','',false));return a}
function lib(s){return s.toLowerCase().replaceAll('_',' ').replace(/^./,c=>c.toUpperCase())}let O=[];function add(n,code,g,f,t,F={},v=''){O.push({n,code,lib:lib(code.replace(n+'_','')),g,f,t,v,sel:n.toLowerCase()+'_'+t+(v?'_'+v.toLowerCase().replaceAll(' ','_'):'')+'_sel',attrs:attrs(n,f,t,F)})}
for(const n of nets){for(const b of lin[n]){let t=b.toLowerCase();add(n,n+'_'+b,'Lineaires','troncon',t);add(n,n+'_'+b+'_CLASSE_A','Lineaires','troncon',t,{clas:'A'},'Classe A');add(n,n+'_'+b+'_CLASSE_B','Lineaires','troncon',t,{clas:'B'},'Classe B');add(n,n+'_'+b+'_CLASSE_C','Lineaires','troncon',t,{clas:'C'},'Classe C');add(n,n+'_'+b+'_ABANDONNE','Lineaires','troncon',t,{etat:'Abandonné'},'Abandonné');if(aerienOK.includes(n))add(n,n+'_'+b+'_AERIEN','Lineaires','troncon',t,{pose:'Aérien'},'Aérien')}for(const p of pts(n)){let f=fam(p);add(n,n+'_'+p,f[0],f[1],p.toLowerCase())}}
function cfg(o){return st[o.code]||{}}function files(o){return cfg(o).files||{}}function aa(o){let m=cfg(o).a||{};return o.attrs.map(x=>Object.assign({},x,m[x.c]||{}))}function deci(o){return cfg(o).d||'A valider'}function persist(){localStorage.setItem(KEY,JSON.stringify(st));stamp()}function stamp(){stats.innerHTML='<div class=stat><b>'+O.length+'</b><div class=muted>Objets</div><div class=muted>Enregistré localement : '+new Date().toLocaleTimeString()+'</div></div>'}
function put(c,a,k,v){st[c]=st[c]||{};st[c].a=st[c].a||{};st[c].a[a]=st[c].a[a]||{};st[c].a[a][k]=v;persist();if(selObj&&selObj.code==c)openPop(c);draw()}function setFile(c,k,v){st[c]=st[c]||{};st[c].files=st[c].files||{};st[c].files[k]=v;persist();if(selObj&&selObj.code==c)openPop(c);draw()}function setD(c,d){st[c]=st[c]||{};st[c].d=d;persist();draw()}
function render(){grp.innerHTML='<option value="">Tous groupes</option>'+[...new Set(O.map(o=>o.g))].map(g=>'<option>'+g+'</option>').join('');nav.innerHTML=nets.map(n=>'<button class="'+(n==cur?'on':'')+'" data-n="'+n+'">'+n+'<br><span class=muted>'+names[n]+'</span></button>').join('');$$('#nav button').forEach(b=>b.onclick=()=>{cur=b.dataset.n;draw()});stamp();draw()}
function draw(){let s=q.value.toLowerCase();let arr=O.filter(o=>o.n==cur&&(!grp.value||o.g==grp.value)&&(!dec.value||deci(o)==dec.value)&&(!s||[o.code,o.lib,o.sel,files(o).bloc_dwg,files(o).icone_palette,files(o).icone_bloc].join(' ').toLowerCase().includes(s)));let by={};arr.forEach(o=>(by[o.g]??=[]).push(o));main.innerHTML='<div class=head><b>'+cur+' - '+names[cur]+'</b><div class=muted>'+arr.length+' objets. Renseigner les noms DWG/PNG/JPG/SVG dans l’onglet Fichiers.</div></div>'+Object.entries(by).map(([g,a])=>'<h3>'+g+' '+a.length+'</h3><div class=cards>'+a.map(card).join('')+'</div>').join('');$$('[data-open]').forEach(b=>b.onclick=()=>openPop(b.dataset.open));$$('[data-d]').forEach(b=>b.onclick=()=>setD(b.dataset.c,b.dataset.d))}
function card(o){let ar=aa(o),f=files(o),vis=ar.filter(x=>x.vis).length,fo=ar.filter(x=>x.fo).length;return '<article class="card '+(deci(o)=='Valide'?'ok':deci(o)=='A corriger'?'ko':deci(o)=='Exclu'?'bad':'')+'"><b>'+o.lib+'</b><div class=code>'+o.code+'</div><span class=pill>'+o.f+'/'+o.t+'</span>'+(o.v?'<span class=pill>'+o.v+'</span>':'')+'<div class=muted>SEL '+o.sel+'<br>ATTR '+ar.length+' - visibles '+vis+' - forcés '+fo+'<br>DWG '+(f.bloc_dwg||'-')+'<br>ICO '+(f.icone_palette||f.icone_bloc||'-')+'</div><button data-d="Valide" data-c="'+o.code+'">Valider</button><button data-d="A corriger" data-c="'+o.code+'">Corriger</button><button data-d="Exclu" data-c="'+o.code+'">Exclure</button><button data-open="'+o.code+'">Attributs / listes</button></article>'}
function openPop(code){selObj=O.find(o=>o.code==code);let o=selObj,ar=aa(o);mt.textContent=o.lib;ms.textContent=o.code+' | '+o.g+' | '+o.sel;pa.innerHTML='<table><tr><th>Champ</th><th>Type</th><th>Libellé</th><th>Liste</th><th>Visible</th><th>Forcé</th><th>Oblig.</th><th>Export</th><th>Valeur forcée</th></tr>'+ar.map(x=>row(o,x)).join('')+'</table>';let used=[...new Set(ar.map(x=>x.li).filter(Boolean))];pl.innerHTML=used.length?used.map(li=>'<h3>'+li+'</h3><div class=muted>'+(vals[li]||['Liste à compléter']).join(' | ')+'</div>').join(''):'<div class=muted>Aucune liste utilisée.</div>';pf.innerHTML='<div class=muted>Renseigner ici uniquement le nom du fichier, sans importer le fichier.</div><table><tr><th>Type</th><th>Nom enregistré</th><th>Modifier</th></tr>'+fileRow(o,'bloc_dwg','Bloc DWG')+fileRow(o,'icone_palette','Icône palette')+fileRow(o,'icone_bloc','Icône bloc')+'</table>';pp.innerHTML='<pre>'+esc(JSON.stringify(patch(o),null,2))+'</pre>';modal.classList.add('open');$$('[data-put]').forEach(b=>b.onclick=()=>put(b.dataset.c,b.dataset.a,b.dataset.k,b.dataset.v=='true'));$$('[data-val]').forEach(i=>i.onchange=()=>put(i.dataset.c,i.dataset.a,'val',i.value));$$('[data-file]').forEach(i=>i.onchange=()=>setFile(i.dataset.c,i.dataset.k,i.value))}
function row(o,x){let sw=(k,v)=>'<button data-put data-c="'+o.code+'" data-a="'+x.c+'" data-k="'+k+'" data-v="'+(!v)+'" class="'+(v?'yes':'no')+'">'+(v?'oui':'non')+'</button>';return '<tr><td>'+x.c+'</td><td>'+x.t+'</td><td>'+x.l+'</td><td>'+x.li+'</td><td>'+sw('vis',x.vis)+'</td><td>'+sw('fo',x.fo)+'</td><td>'+sw('obl',x.obl)+'</td><td>'+sw('exp',x.exp)+'</td><td><input data-val data-c="'+o.code+'" data-a="'+x.c+'" value="'+esc(x.val||'')+'"></td></tr>'}
function fileRow(o,k,l){let v=files(o)[k]||'';return '<tr><td>'+l+'</td><td class=code>'+(v||'-')+'</td><td><input class=field data-file data-c="'+o.code+'" data-k="'+k+'" value="'+esc(v)+'"></td></tr>'}
function patch(o){return{reseau:o.n,groupe:o.g,code:o.code,libelle:o.lib,geometrie:o.f=='troncon'?'Ligne':'Point',selection:o.sel,decision:deci(o),fichiers:files(o),attributs:aa(o)}}
function expJSON(){download('land2map_validation_v21.json',JSON.stringify({version:'v21',date:new Date().toISOString(),objets:O.map(patch)},null,2))}function expCSV(){let rows=[['reseau','groupe','code','libelle','selection','bloc_dwg','icone_palette','icone_bloc','champ','type','liste','visible','force','obligatoire','exportable','valeur_forcee']];O.forEach(o=>aa(o).forEach(a=>{let f=files(o);rows.push([o.n,o.g,o.code,o.lib,o.sel,f.bloc_dwg||'',f.icone_palette||'',f.icone_bloc||'',a.c,a.t,a.li,a.vis,a.fo,a.obl,a.exp,a.val||''])}));download('land2map_validation_v21.csv',rows.map(r=>r.map(x=>'"'+String(x).replaceAll('"','""')+'"').join(';')).join('\n'))}function download(n,c){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=n;a.click();URL.revokeObjectURL(a.href)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}json.onclick=expJSON;csv.onclick=expCSV;saveBtn.onclick=()=>{persist();stamp()};close.onclick=()=>modal.classList.remove('open');$$('.tabs button').forEach(b=>b.onclick=()=>{$$('.tabs button').forEach(x=>x.classList.remove('on'));$$('.pane').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('#p'+b.dataset.tab).classList.add('on')});q.oninput=draw;grp.oninput=draw;dec.oninput=draw;render();
</script></body></html>
