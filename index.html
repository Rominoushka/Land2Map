<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Land2Map</title><style>body{margin:0;background:#0b1020;color:#f8fafc;font-family:system-ui}header,.bar,aside,main{padding:12px}input,select,button{font:inherit;background:#172033;color:#f8fafc;border:1px solid #334155;border-radius:10px;padding:9px}.bar{display:grid;gap:8px}.wrap{display:block}.nav{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.nav button.on{outline:2px solid #60a5fa}.card,.head,.stat{background:#111827;border:1px solid #334155;border-radius:14px;padding:10px;margin:8px 0}.cards{display:grid;gap:8px}.muted,.code{color:#94a3b8;font-size:12px}.pill{display:inline-block;border:1px solid #334155;border-radius:999px;padding:3px 7px;font-size:11px;margin:3px}.ok{border-color:#22c55e}.ko{border-color:#f97316}.bad{border-color:#ef4444}.attrs{display:none;margin-top:8px;overflow:auto}.attrs.open{display:block}table{border-collapse:collapse;width:100%;font-size:13px}td,th{border-bottom:1px solid #334155;padding:5px;text-align:left}@media(min-width:900px){.bar{grid-template-columns:1fr 160px 160px}.wrap{display:grid;grid-template-columns:250px 1fr}.nav{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}}</style></head><body><header><h2>Land2Map - Palette</h2><div class="muted">Préfixes métier 10 caractères max - câble che_, fourreau fou_, branchement brt_</div></header><section class="bar"><input id="q" placeholder="Recherche"><select id="grp"><option value="">Tous groupes</option></select><select id="dec"><option value="">Toutes decisions</option><option>A valider</option><option>Valide</option><option>A corriger</option><option>Exclu</option></select></section><div class="wrap"><aside><div id="stats"></div><div id="nav" class="nav"></div></aside><main id="main"></main></div><script>const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));let cur='AEP';const st=JSON.parse(localStorage.getItem('l2m_attr_visible_v17')||'{}');const nets=['AEP','EUS','EPL','UNI','MLT','ECL','BTA','HTA','HTB','TEL','CFA','GAZ','CHI','CHU','HYD','ARO','SGN','NDE','FRV'];const names={AEP:'Eau potable',EUS:'Eaux usees',EPL:'Eaux pluviales',UNI:'Unitaire',MLT:'Multireseaux',ECL:'Eclairage public',BTA:'Basse tension',HTA:'Haute tension A',HTB:'Haute tension B',TEL:'Telecom',CFA:'Courants faibles',GAZ:'Gaz',CHI:'Chimique',CHU:'Chauffage urbain',HYD:'Hydrocarbures',ARO:'Arrosage',SGN:'Signalisation',NDE:'Non determine',FRV:'Fourreau vide'};const lin={AEP:['CANALISATION','BRANCHEMENT'],EUS:['TRONCON','BRANCHEMENT'],EPL:['TRONCON','BRANCHEMENT'],UNI:['TRONCON','BRANCHEMENT'],MLT:['TRONCON','FOURREAU'],ECL:['CABLE','FOURREAU'],BTA:['CABLE','FOURREAU'],HTA:['CABLE','FOURREAU'],HTB:['CABLE','FOURREAU'],TEL:['CABLE','FOURREAU'],CFA:['CABLE','FOURREAU'],GAZ:['CANALISATION','BRANCHEMENT'],CHI:['CANALISATION','BRANCHEMENT'],CHU:['CANALISATION','BRANCHEMENT'],HYD:['CANALISATION','BRANCHEMENT'],ARO:['CANALISATION','BRANCHEMENT'],SGN:['CABLE','FOURREAU'],NDE:['TRONCON','FOURREAU'],FRV:['FOURREAU']};const ass=['REGARD_CIRCULAIRE','REGARD_RECTANGULAIRE','BOITE_BRANCHEMENT','TAMPON','POSTE_RELEVAGE','DEVERSOIR'];const elec=['POSTE','ARMOIRE','COFFRET','TRANSFORMATEUR','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','POTEAU','APPUI','PLAQUE_RONDE'];const tel=['CHAMBRE_TIRAGE','REGARD_TECHNIQUE','ARMOIRE','BORNE','BOITIER','POTEAU','APPUI','PLAQUE_RONDE'];const flu=['VANNE','REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','BOUCHE_CLE','ARMOIRE_COMMANDE','PLAQUE_RONDE'];function pts(n){if(n=='AEP')return['VANNE','PURGE','VENTOUSE','CLAPET','BOUCHE_CLE','BOUCHE_INCENDIE','POTEAU_INCENDIE','COMPTEUR','REGARD_TECHNIQUE','PLAQUE_RONDE'];if(['EUS','EPL','UNI'].includes(n))return n=='EUS'?ass:ass.concat(['AVALOIR','GRILLE_AVALOIR']);if(n=='ECL')return['ARMOIRE','COFFRET','CANDELABRE','MAT','LUMINAIRE','PROJECTEUR','BORNE_LUMINEUSE','CHAMBRE_TIRAGE','REGARD_TECHNIQUE','PLAQUE_RONDE'];if(['BTA','HTA','HTB'].includes(n))return elec;if(['TEL','CFA','SGN'].includes(n))return tel;if(['GAZ','CHI','CHU','HYD','ARO'].includes(n))return flu;return['REGARD_TECHNIQUE','CHAMBRE_TECHNIQUE','PLAQUE_RONDE','BORNE','REPERE']}function fam(x){if(['POTEAU','POTEAU_INCENDIE','APPUI','MAT','CANDELABRE'].includes(x))return['Supports','support'];if(x.includes('PLAQUE')||x.includes('TAMPON')||x.includes('BOUCHE')||x.includes('GRILLE'))return['Affleurants','affleurant'];if(x.includes('REGARD')||x.includes('CHAMBRE')||x=='POSTE'||x=='POSTE_RELEVAGE')return['Ouvrages','ouvrage'];return['Equipements','equipement']}function A(c,t,l,li='',v=''){return{champ:c,type:t,lib:l,liste:li,force:v}}function pref(f,t){if(t=='cable')return'che';if(t=='fourreau')return'fou';if(t=='branchement')return'brt';if(['canalisation','troncon','conduite'].includes(t))return'trc';return{ouvrage:'ouv',affleurant:'afl',equipement:'eqp',support:'sup'}[f]||'obj'}function attrs(n,f,t,F={}){let p=pref(f,t);let a=[A('id','UUID','Identifiant'),A('calque','Texte','Calque AutoCAD','',F.calque||('ECA_RSX_'+n+'_'+t.toUpperCase())),A(p+'_type','Texte','Type objet','',t),A(p+'_mlev','Liste','Mode leve','LST_MODE_LEVE'),A(p+'_classe','Liste','Classe precision','LST_CLASSE_PRECISION',F.clas||''),A(p+'_etat','Liste','Etat','LST_ETAT_RESEAU',F.etat||''),A(p+'_pose','Liste','Mode de pose','LST_POSE',F.pose||''),A('x','Nombre','Coordonnee X'),A('y','Nombre','Coordonnee Y'),A('z','Nombre','Altitude Z'),A('gnss_hdop','Nombre','GNSS HDOP'),A('gnss_vdop','Nombre','GNSS VDOP'),A('gnss_pdop','Nombre','GNSS PDOP'),A('gnss_fix','Liste','Solution GNSS','LST_GNSS_FIX'),A('gnss_prec','Nombre','Precision GNSS'),A('date_leve','Date','Date leve'),A('src_leve','Texte','Source leve'),A('matricule','Texte','Matricule point'),A(p+'_obs','Texte','Observation')];if(f!='troncon')a.push(A('acad_ech','Nombre','Echelle AutoCAD'),A('acad_xech','Nombre','Echelle X AutoCAD'),A('acad_yech','Nombre','Echelle Y AutoCAD'),A('acad_rot','Nombre','Rotation AutoCAD'));return a}function lib(s){return s.toLowerCase().replaceAll('_',' ').replace(/^./,c=>c.toUpperCase())}let O=[];function add(n,code,g,f,t,F={},v=''){O.push({n,code,lib:lib(code.replace(n+'_','')),g,f,t,v,sel:n.toLowerCase()+'_'+t+(v?'_'+v.toLowerCase().replaceAll(' ','_'):'')+'_sel',attrs:attrs(n,f,t,F)})}for(const n of nets){for(const b of lin[n]){let t=b.toLowerCase();add(n,n+'_'+b,'Lineaires','troncon',t);add(n,n+'_'+b+'_CLASSE_A','Lineaires','troncon',t,{clas:'A'},'Classe A');add(n,n+'_'+b+'_CLASSE_B','Lineaires','troncon',t,{clas:'B'},'Classe B');add(n,n+'_'+b+'_CLASSE_C','Lineaires','troncon',t,{clas:'C'},'Classe C');add(n,n+'_'+b+'_ABANDONNE','Lineaires','troncon',t,{etat:'Abandonne'},'Abandonne');add(n,n+'_'+b+'_AERIEN','Lineaires','troncon',t,{pose:'Aerien'},'Aerien')}for(const p of pts(n)){let f=fam(p);add(n,n+'_'+p,f[0],f[1],p.toLowerCase())}}function decision(o){return st[o.code]?.d||'A valider'}function render(){let groups=[...new Set(O.map(o=>o.g))];grp.innerHTML='<option value="">Tous groupes</option>'+groups.map(g=>'<option>'+g+'</option>').join('');stats.innerHTML='<div class=stat><b>'+O.length+'</b><div class=muted>Objets</div></div>';nav.innerHTML=nets.map(n=>'<button class="'+(n==cur?'on':'')+'" data-n='+n+'>'+n+'<br><span class=muted>'+names[n]+'</span></button>').join('');$$('#nav button').forEach(b=>b.onclick=()=>{cur=b.dataset.n;draw()});draw()}function draw(){let s=q.value.toLowerCase();let arr=O.filter(o=>o.n==cur&&(!grp.value||o.g==grp.value)&&(!dec.value||decision(o)==dec.value)&&(!s||[o.code,o.lib,o.sel].join(' ').toLowerCase().includes(s)));let by={};arr.forEach(o=>(by[o.g]??=[]).push(o));main.innerHTML='<div class=head><b>'+cur+' - '+names[cur]+'</b><div class=muted>'+arr.length+' objets. Câble che_, fourreau fou_, branchement brt_.</div></div>'+Object.entries(by).map(([g,a])=>'<h3>'+g+' '+a.length+'</h3><div class=cards>'+a.map(card).join('')+'</div>').join('');$$('[data-show]').forEach(b=>b.onclick=()=>b.closest('.card').querySelector('.attrs').classList.toggle('open'));$$('[data-d]').forEach(b=>b.onclick=()=>{let c=b.closest('.card').dataset.c;st[c]={...(st[c]||{}),d:b.dataset.d};localStorage.setItem('l2m_attr_visible_v17',JSON.stringify(st));draw()})}function card(o){return'<article class="card '+(decision(o)=='Valide'?'ok':decision(o)=='A corriger'?'ko':decision(o)=='Exclu'?'bad':'')+'" data-c="'+o.code+'"><b>'+o.lib+'</b><div class=code>'+o.code+'</div><span class=pill>'+o.f+'/'+o.t+'</span>'+(o.v?'<span class="pill warn">'+o.v+'</span>':'')+'<div class=muted>SEL '+o.sel+'<br>ATTR '+o.attrs.length+'</div><div><button data-d="Valide">Valider</button> <button data-d="A corriger">Corriger</button> <button data-d="Exclu">Exclure</button> <button data-show>Voir attributs</button></div><div class=attrs><table><tr><th>Champ</th><th>Type</th><th>Libelle</th><th>Liste</th><th>Force</th></tr>'+o.attrs.map(a=>'<tr><td>'+a.champ+'</td><td>'+a.type+'</td><td>'+a.lib+'</td><td>'+a.liste+'</td><td>'+a.force+'</td></tr>').join('')+'</table></div></article>'}q.oninput=draw;grp.oninput=draw;dec.oninput=draw;render();</script></body></html>
